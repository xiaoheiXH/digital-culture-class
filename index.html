<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>校园地图（H5 样板）</title>
    <link rel="stylesheet" href="./styles.css" />
    <!-- 引入高德地图 JS API (需替换为您自己的 KEY) -->
    <script type="text/javascript">
      window._AMapSecurityConfig = {
        securityJsCode: "a8987310aeabfad9de406b9a9dc2c21c", // 填写您的安全密钥
      };
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=9551dc2c63c49df184a0033729ea75a5"></script>
  </head>
  <body>
    <!-- 登录界面 -->
    <div id="loginOverlay" class="login-overlay">
      <div class="login-card">
        <div class="login-header">
        <img src="./svg/marker.svg" alt="Logo" class="login-logo" />
          <h2>校园导览系统</h2>
          <div class="login-tabs">
            <button type="button" id="tabLogin" class="login-tab active">登录</button>
            <button type="button" id="tabRegister" class="login-tab">注册</button>
          </div>
          <p id="loginSubtitle">请登录以开始您的探索之旅</p>
        </div>
        <form id="loginForm" class="login-form">
          <div class="form-group">
            <label for="username">账号</label>
            <input type="text" id="username" placeholder="请输入您的账号" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="请输入您的密码" required autocomplete="current-password" />
          </div>
          <button type="submit" id="authSubmitBtn" class="login-btn">进入系统</button>
          <button type="button" id="skipLogin" class="skip-btn">先随便看看 (匿名使用)</button>
          <p id="loginError" class="login-error is-hidden">账号或密码错误，请重试</p>
        </form>
        <div class="login-footer">
          <p id="loginFooterText">直接注册，拥有专属账号</p>
        </div>
      </div>
    </div>

    <header class="app-header is-active" id="appHeader">
      <div class="search-wrap" role="search">
        <span class="search-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="7" />
            <path d="M21 21l-4.3-4.3" />
          </svg>
        </span>
        <input id="searchInput" type="search" placeholder="搜索楼宇 / 教室 / 地点" autocomplete="off" />
        <div id="searchResults" class="search-results is-hidden"></div>
      </div>
    </header>

    <main class="app-main">
      <section class="page is-active" id="page-map" data-page="map" aria-label="地图">
        <div class="map-stage" aria-label="地图功能区（占满搜索栏与导航栏之间）">
          <div class="map-placeholder" id="mapContent" aria-label="地图区域">
            <!-- 高德地图将在此渲染 -->
          </div>
          <button id="geoBtn" class="map-ctrl-btn geo-btn" title="我的位置">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
            </svg>
          </button>
        </div>

        <div id="mapMenu" class="map-menu is-hidden" role="menu" aria-label="地图操作菜单">
          <button id="menuCreate" type="button" class="menu-btn" role="menuitem">新建</button>
          <button id="menuEdit" type="button" class="menu-btn" role="menuitem">修改</button>
          <button id="menuDelete" type="button" class="menu-btn menu-btn-danger" role="menuitem">删除</button>
        </div>

        <div id="formModal" class="overlay is-hidden" aria-hidden="true">
          <div class="dialog" role="dialog" aria-modal="true" aria-label="地点编辑">
            <div class="dialog-title" id="dialogTitle">新建地点</div>
            <form id="pointForm" class="point-form">
              <label class="field">
                <span class="field-label">地点名称</span>
                <input id="pointName" type="text" maxlength="40" placeholder="例如：图书馆南门" required />
              </label>

              <label class="field">
                <span class="field-label">地点图标（可导入图片）</span>
                <input id="pointIconFile" type="file" accept="image/*" />
              </label>

              <label class="field">
                <span class="field-label">5字小标题（可选）</span>
                <input id="pointSubtitle" type="text" maxlength="5" placeholder="例如：拍照圣地" />
              </label>

              <label class="field">
                <span class="field-label">地点详情</span>
                <textarea id="pointDesc" rows="4" maxlength="400" placeholder="输入地点介绍、开放时间、注意事项等"></textarea>
              </label>

              <div class="icon-preview-wrap">
                <img id="iconPreview" class="icon-preview is-hidden" alt="图标预览" />
              </div>

              <div class="dialog-actions">
                <button id="cancelForm" type="button" class="btn btn-light">取消</button>
                <button type="submit" class="btn btn-primary">保存</button>
              </div>
            </form>
          </div>
        </div>

        <div id="detailView" class="detail-view is-hidden" aria-hidden="true">
          <div class="detail-header">
            <button id="backDetail" type="button" class="btn-back">← 返回地图</button>
            <div class="detail-actions">
              <button id="btnFavorite" class="btn-icon" title="收藏">
                <img src="./svg/favorites.svg" alt="收藏" width="20" height="20" />
              </button>
              <button id="btnShare" class="btn-icon" title="转发/分享">
                <img src="./svg/share.svg" alt="转发" width="20" height="20" />
              </button>
            </div>
          </div>
          <div class="detail-body">
            <div class="detail-icon-wrap">
              <img id="detailIcon" class="detail-icon is-hidden" alt="地点图标" />
            </div>
            <h2 id="detailName" class="detail-name">地点名称</h2>
            <div id="detailDistance" class="detail-distance is-hidden">距离</div>
            <p id="detailDesc" class="detail-desc">暂无详情</p>
            
            <div class="detail-like-wrap">
              <button id="btnLike" class="btn-like">
                <span class="like-icon"><img src="./svg/like.svg" alt="点赞" width="18" height="18" /></span>
                <span class="like-text">点赞</span>
                <span id="likeCount">0</span>
              </button>
            </div>

            <div class="detail-photos-section">
              <h3 class="section-title">实景照片</h3>
              <div id="detailPhotos" class="photos-grid">
                <!-- 照片占位 -->
                <div class="photo-placeholder">暂无实景照片</div>
              </div>
            </div>

            <div class="detail-comments-section">
              <h3 class="section-title">用户评论</h3>
              <div id="commentsList" class="comments-list">
                <!-- 评论列表 -->
                <div class="comment-placeholder">暂无评论数据</div>
              </div>
              <div class="comment-input-area">
                <!-- 隐藏昵称输入框，强制匿名用户以“匿名用户”为名 -->
                <input id="commentNickname" type="text" placeholder="您的昵称" class="nickname-input is-hidden" />
                <div class="comment-submit-wrap">
                  <input id="commentInput" type="text" placeholder="说点什么吧..." class="message-input" />
                  <button id="submitComment" class="btn btn-primary btn-sm">发送</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- 统一列表弹窗 (用于收藏/评论/好友) -->
        <div id="genericListModal" class="overlay is-hidden" aria-hidden="true">
          <div class="dialog">
            <div class="dialog-header">
              <h3 id="genericListTitle">列表</h3>
              <button id="closeGenericList" class="btn-close" aria-label="关闭"><img src="./svg/false.svg" alt="" width="18" height="18" /></button>
            </div>
            <div class="dialog-body" style="max-height: 60vh; overflow-y: auto;">
              <!-- 列表内容渲染区域 -->
              <div id="genericListContainer" class="generic-list-container"></div>
            </div>
          </div>
        </div>

      </section>

      <section class="page" id="page-memorial" data-page="memorial" aria-label="活动">
        <div class="activity-page">
          <div class="activity-top">
            <div class="activity-header">
              <div id="activityDateLabel" class="activity-date-label">日期</div>
              <div class="activity-actions">
                <button id="openCalendar" type="button" class="btn btn-light btn-sm">切换</button>
                <button id="btnAddEvent" type="button" class="btn btn-primary btn-sm is-hidden">发布</button>
              </div>
            </div>
            <div class="activity-week">
              <div class="activity-weekdays" aria-hidden="true">
                <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
              </div>
              <div id="activityDayRow" class="activity-day-row" aria-label="日期选择"></div>
            </div>
          </div>
          <div id="activityList" class="activity-list"></div>
        </div>
      </section>

      <section class="page" id="page-discover" data-page="discover" aria-label="发现">
        <div class="discover-page">
          <div class="discover-header">
            <h2 class="discover-title">推荐打卡点</h2>
            <button id="btnDiscoverRefresh" type="button" class="btn btn-light btn-sm">换一换</button>
          </div>
          <div id="discoverList" class="discover-list"></div>
        </div>
      </section>

      <section class="page" id="page-me" data-page="me" aria-label="我的">
        <div class="me-page">
          <div class="me-header">
            <div class="me-avatar"><img src="./svg/profile.svg" alt="头像" style="width:100%;height:100%;border-radius:50%;" /></div>
            <div class="me-info">
              <h2 id="meUsername">未登录</h2>
              <p id="meRole">角色：访客</p>
            </div>
          </div>
          <div class="me-list">
            <div class="me-item" id="openFavorites">
              <span class="me-item-icon"><img src="./svg/favorites.svg" alt="收藏" width="20" height="20"/></span>
              <span class="me-item-label">我的收藏</span>
            </div>
            <div class="me-item" id="openMyComments">
              <span class="me-item-icon"><img src="./svg/messages.svg" alt="评论" width="20" height="20"/></span>
              <span class="me-item-label">我的评论</span>
            </div>
            <div class="me-item" id="openFriends">
              <span class="me-item-icon"><img src="./svg/profile.svg" alt="好友" width="20" height="20"/></span>
              <span class="me-item-label">我的好友</span>
            </div>
            <div class="me-item" id="openSettings">
              <span class="me-item-icon"><img src="./svg/settings.svg" alt="设置" width="20" height="20"/></span>
              <span class="me-item-label">设置</span>
            </div>
          </div>
          <button id="logoutBtn" class="logout-btn">退出登录</button>
          <button id="loginBtnMe" class="login-btn-me is-hidden">去登录 / 管理员登录</button>
        </div>

        <!-- 独立的全屏子页面 (收藏/评论/好友) -->
        <div id="meSubpage" class="me-subpage is-hidden" aria-hidden="true">
          <div class="subpage-header">
            <button id="backSubpage" type="button" class="btn-back">← 返回</button>
            <h3 id="subpageTitle" class="subpage-title">列表</h3>
          </div>
          <div class="subpage-body">
            <!-- 好友页面的新增输入框 -->
            <div id="addFriendArea" class="is-hidden" style="padding: 12px; display: flex; gap: 8px;">
              <input type="text" id="friendNameInput" placeholder="输入好友账号名" class="message-input" />
              <button id="addFriendBtn" class="btn btn-primary btn-sm">添加</button>
            </div>
            <!-- 列表内容渲染区域 -->
            <div id="subpageListContainer" class="generic-list-container"></div>
          </div>
        </div>

        <!-- 设置弹窗 -->
        <div id="settingsModal" class="overlay is-hidden" aria-hidden="true">
          <div class="dialog">
            <div class="dialog-header">
              <h3>系统设置</h3>
              <button id="closeSettings" class="btn-close" aria-label="关闭"><img src="./svg/false.svg" alt="" width="18" height="18" /></button>
            </div>
            <div class="dialog-body">
              <div class="settings-list">
                <div class="settings-item" id="syncCloud">
                  <div class="settings-item-info">
                    <span class="settings-item-title">同步云端数据</span>
                    <span class="settings-item-desc">手动从服务器获取最新标点数据</span>
                  </div>
                  <span class="settings-item-action">☁️</span>
                </div>
                <div class="settings-item" id="togglePerfMode">
                  <div class="settings-item-info">
                    <span class="settings-item-title">性能模式</span>
                    <span class="settings-item-desc">降低渲染开销，减少卡顿（切换后自动刷新）</span>
                  </div>
                  <span id="perfModeState" class="settings-switch">关</span>
                </div>
                <div class="settings-item" id="toggleMarkerOpenMode">
                  <div class="settings-item-info">
                    <span class="settings-item-title">标点单击打开</span>
                    <span class="settings-item-desc">开启：单击打开详情；关闭：双击打开详情</span>
                  </div>
                  <span id="markerOpenModeState" class="settings-switch">开</span>
                </div>
                <!-- 未来可以增加更多设置项 -->
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- 全屏图片查看器 -->
    <div id="imageViewer" class="image-viewer is-hidden" aria-hidden="true">
      <button id="closeImageViewer" class="btn-close-viewer" aria-label="关闭"><img src="./svg/false.svg" alt="" width="18" height="18" /></button>
      <button id="downloadImageViewer" class="btn-download-viewer">保存图片</button>
      <img id="viewerImage" src="" alt="全屏查看" />
    </div>
    
    <div id="eventDetailView" class="event-detail is-hidden" aria-hidden="true">
      <div class="event-detail-header">
        <button id="backEventDetail" type="button" class="btn-back">← 返回</button>
        <div class="event-detail-actions">
          <button id="deleteEvent" type="button" class="btn btn-light btn-sm is-hidden">删除</button>
          <button id="closeEventDetail" type="button" class="btn-close" aria-label="关闭"><img src="./svg/false.svg" alt="" width="18" height="18" /></button>
        </div>
      </div>
      <div id="eventDetailBody" class="event-detail-body">
        <img id="eventDetailImage" class="event-detail-image is-hidden" alt="活动配图" />
        <div id="eventDetailImagePlaceholder" class="event-detail-image placeholder">配图</div>
        <h2 id="eventDetailTitle" class="event-detail-title">活动标题</h2>
        <div class="event-meta">
          <div id="eventDetailDate" class="event-date">日期</div>
          <button id="eventLikeBtn" type="button" class="event-like-btn">
            <span class="like-icon"><img src="./svg/like.svg" alt="点赞" width="18" height="18" /></span>
            <span class="like-text">点赞</span>
            <span id="eventLikeCount">0</span>
          </button>
        </div>
        <div id="eventDetailContent" class="event-detail-content">活动公告</div>
      </div>
      <div id="eventScrollIndicator" class="scroll-indicator" aria-hidden="true">
        <div id="eventScrollThumb" class="scroll-thumb"></div>
      </div>
    </div>
    
    <div id="eventFormModal" class="overlay is-hidden" aria-hidden="true">
      <div class="dialog" role="dialog" aria-modal="true" aria-label="发布活动">
        <div class="dialog-header">
          <h3>发布活动</h3>
          <button id="closeEventForm" class="btn-close" aria-label="关闭"><img src="./svg/false.svg" alt="" width="18" height="18" /></button>
        </div>
        <div class="dialog-body">
          <form id="eventForm" class="point-form">
            <label class="field">
              <span class="field-label">活动日期</span>
              <input id="eventDateInput" type="date" />
            </label>
            <label class="field">
              <span class="field-label">活动标题</span>
              <input id="eventTitleInput" type="text" maxlength="60" placeholder="输入活动标题" />
            </label>
            <label class="field">
              <span class="field-label">活动配图（可选）</span>
              <input id="eventImageFile" type="file" accept="image/*" />
            </label>
            <div class="icon-preview-wrap">
              <img id="eventImagePreview" class="icon-preview is-hidden" alt="配图预览" />
            </div>
            <label class="field">
              <span class="field-label">活动内容</span>
              <textarea id="eventContentInput" rows="6" maxlength="800" placeholder="输入活动公告内容"></textarea>
            </label>
            <div class="dialog-actions">
              <button id="cancelEventForm" type="button" class="btn btn-light">取消</button>
              <button type="submit" class="btn btn-primary">发布</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    
    <div id="calendarModal" class="overlay is-hidden" aria-hidden="true">
      <div class="dialog" role="dialog" aria-modal="true" aria-label="选择日期">
        <div class="dialog-header">
          <h3>选择日期</h3>
          <button id="closeCalendar" class="btn-close" aria-label="关闭"><img src="./svg/false.svg" alt="" width="18" height="18" /></button>
        </div>
        <div class="dialog-body">
          <label class="field">
            <span class="field-label">年月</span>
            <input id="monthPicker" type="month" />
          </label>
          <div class="calendar-grid-header" aria-hidden="true">
            <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
          </div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </div>
      </div>
    </div>
    
    <div id="toast" class="toast is-hidden" aria-live="polite"></div>

    <footer class="app-footer" aria-label="底部导航">
      <nav class="tab-bar" role="tablist" aria-label="主导航">
        <button type="button" class="tab-item is-active" data-tab="map" role="tab" aria-selected="true">
          <span class="tab-icon" aria-hidden="true"><img src="./svg/nav.svg" alt="地图" width="24" height="24"/></span>
          <span class="tab-label">地图</span>
        </button>
        <button type="button" class="tab-item" data-tab="memorial" role="tab" aria-selected="false">
          <span class="tab-icon" aria-hidden="true"><img src="./svg/notifications.svg" alt="活动" width="24" height="24"/></span>
          <span class="tab-label">活动</span>
        </button>
        <button type="button" class="tab-item" data-tab="discover" role="tab" aria-selected="false">
          <span class="tab-icon" aria-hidden="true"><img src="./svg/favorites.svg" alt="发现" width="24" height="24"/></span>
          <span class="tab-label">发现</span>
        </button>
        <button type="button" class="tab-item" data-tab="me" role="tab" aria-selected="false">
          <span class="tab-icon" aria-hidden="true"><img src="./svg/profile.svg" alt="我的" width="24" height="24"/></span>
          <span class="tab-label">我的</span>
        </button>
      </nav>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
